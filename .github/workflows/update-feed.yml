name: Refresh statutory updates feed

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest official updates
        run: python fetch_updates.py

      - name: Commit updated feed (if changed)
        run: |
          git config user.name "statutory-update-bot"
          git config user.email "actions@users.noreply.github.com"
          git add updates-feed.json
          git diff --staged --quiet || git commit -m "Auto-refresh statutory updates feed"
          git push
